{{- if .Values.networkPolicy.enabled -}}
---
# Restrict operator pod network access:
# - Ingress: only health probes
# - Egress: DNS, Vaultwarden HTTPS, Kubernetes API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vaultwarden-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vaultwarden-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vaultwarden-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        {{- range .Values.networkPolicy.ingressPorts }}
        - port: {{ .port }}
          protocol: {{ .protocol }}
        {{- end }}
  egress:
    - ports:
        {{- range .Values.networkPolicy.egressPorts }}
        - port: {{ .port }}
          protocol: {{ .protocol }}
        {{- end }}
{{- end }}
