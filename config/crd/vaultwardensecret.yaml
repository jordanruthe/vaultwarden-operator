apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vaultwardensecrets.secrets.vaultwarden.io
spec:
  group: secrets.vaultwarden.io
  names:
    kind: VaultwardenSecret
    plural: vaultwardensecrets
    shortNames:
    - vws
    singular: vaultwardensecret
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for VaultwardenSecretSpec via `CustomResource`
        properties:
          spec:
            description: |-
              VaultwardenSecret syncs secrets from Vaultwarden into a Kubernetes Secret.

              Create a VaultwardenSecret to have the operator pull the listed vault items and write them as a native Kubernetes Secret with the same name and namespace.
            properties:
              data:
                description: List of Vaultwarden items to fetch.
                items:
                  description: Maps a Kubernetes Secret key to a Vaultwarden item name.
                  properties:
                    key:
                      description: Key name in the resulting Kubernetes Secret.
                      type: string
                    vaultwardenSecret:
                      description: Item name to look up in Vaultwarden (case-insensitive, supports partial match).
                      type: string
                  required:
                  - key
                  - vaultwardenSecret
                  type: object
                type: array
              syncInterval:
                default: 5m
                description: How often to re-sync from Vaultwarden. Must be a valid duration string (e.g. "5m", "1h"). Defaults to "5m".
                type: string
            required:
            - data
            type: object
          status:
            description: VaultwardenSecretStatus reflects the observed state.
            nullable: true
            properties:
              conditions:
                description: Latest available observations of the resource state.
                items:
                  description: A standard Kubernetes status condition (mirrors `metav1.Condition`).
                  properties:
                    lastTransitionTime:
                      description: When this condition last transitioned (RFC3339).
                      type: string
                    message:
                      description: Human-readable message.
                      type: string
                    observedGeneration:
                      description: Generation of the object the condition was set on.
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      description: CamelCase reason code for the condition.
                      type: string
                    status:
                      description: 'Status of the condition: "True", "False", or "Unknown".'
                      type: string
                    type:
                      description: Type of the condition (e.g. "Ready", "SyncFailed").
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastSyncError:
                description: Error message from the last failed sync.
                type: string
              lastSyncTime:
                description: Timestamp of the last successful sync (RFC3339).
                nullable: true
                type: string
              observedGeneration:
                description: Most recent generation observed by the controller.
                format: int64
                nullable: true
                type: integer
              ready:
                default: false
                description: Whether the secret has been successfully synced.
                type: boolean
            type: object
        required:
        - spec
        title: VaultwardenSecret
        type: object
    served: true
    storage: true
    subresources:
      status: {}
