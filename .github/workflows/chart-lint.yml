name: Lint Helm Chart

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"

jobs:
  lint:
    name: Lint & Test Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --charts charts/vaultwarden-operator
