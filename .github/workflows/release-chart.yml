name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "pages/**"
  workflow_dispatch:

jobs:
  release:
    name: Package & Publish Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Install cr (chart-releaser CLI) directly — we drive it manually so that
      # packaging is unconditional rather than git-diff-gated (which silently
      # produces nothing when there are no tags in the repo).
      - name: Install chart-releaser CLI
        run: |
          CR_VERSION=v1.7.0
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -sSLo cr.tar.gz \
            "https://github.com/helm/chart-releaser/releases/download/${CR_VERSION}/chart_releaser_${CR_VERSION#v}_linux_${ARCH}.tar.gz"
          tar -xzf cr.tar.gz cr
          sudo mv cr /usr/local/bin/cr
          rm cr.tar.gz

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/vaultwarden-operator --destination .cr-release-packages

      - name: Upload chart to GitHub Releases
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --skip-existing \
            --packages-with-index=false \
            --mark-as-latest
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm repo index on gh-pages
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --charts-repo "https://jordanruthe.github.io/vaultwarden-operator" \
            --index-path .cr-index-cache/index.yaml \
            --push
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # cr index --push has committed index.yaml + .nojekyll to gh-pages.
      # Fetch the updated branch and overlay the static landing page.
      - name: Publish landing page to gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages

          cp pages/index.html /tmp/gh-pages/index.html
          cp pages/.nojekyll  /tmp/gh-pages/.nojekyll

          cd /tmp/gh-pages
          git add index.html .nojekyll
          if git diff --cached --quiet; then
            echo "Landing page unchanged, nothing to push."
          else
            git commit -m "chore: update landing page"
            git push origin gh-pages
          fi
