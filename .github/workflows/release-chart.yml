name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "pages/**"
  workflow_dispatch:

jobs:
  release:
    name: Package & Publish Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Install cr via the action (install_only skips the built-in release logic)
      # so we can drive package/upload/index manually and avoid git-diff gating.
      - name: Install chart-releaser CLI
        uses: helm/chart-releaser-action@v1
        with:
          install_only: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/vaultwarden-operator --destination .cr-release-packages

      - name: Upload chart to GitHub Releases
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --skip-existing
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm repo index on gh-pages
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --charts-repo "https://jordanruthe.github.io/vaultwarden-operator" \
            --push
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # cr index --push has committed index.yaml + .nojekyll to gh-pages.
      # Fetch the updated branch and overlay the static landing page.
      - name: Publish landing page to gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages

          cp pages/index.html /tmp/gh-pages/index.html
          cp pages/.nojekyll  /tmp/gh-pages/.nojekyll

          cd /tmp/gh-pages
          git add index.html .nojekyll
          if git diff --cached --quiet; then
            echo "Landing page unchanged, nothing to push."
          else
            git commit -m "chore: update landing page"
            git push origin gh-pages
          fi
